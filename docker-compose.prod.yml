version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    command: >
      sh -c "
      exec uv run gunicorn -w ${GUNICORN_WORKERS:-64}
      --bind unix:/tmp/app.sock
      --bind 0.0.0.0:5000
      --access-logfile -
      --error-logfile -
      run:app
      "
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_READ_URL=${DATABASE_READ_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FLASK_DEBUG=${FLASK_DEBUG}
      - BASE_URL=${BASE_URL}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS}
    depends_on:
      - redis
    volumes:
      - socket_data:/tmp   # 🔥 CRITICAL (shared with nginx)
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - socket_data:/tmp   # 🔥 SAME VOLUME
    depends_on:
      - app
    restart: always

volumes:
  socket_data: