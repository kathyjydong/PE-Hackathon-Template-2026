version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    command: >
      sh -c "
      rm -rf /tmp/prometheus && mkdir -p /tmp/prometheus &&
      exec uv run gunicorn -w ${GUNICORN_WORKERS:-64}
      --config gunicorn_conf.py
      --bind unix:/tmp/app.sock
      --bind 0.0.0.0:5000
      --access-logfile -
      --error-logfile -
      run:app
      "
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_READ_URL=${DATABASE_READ_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FLASK_DEBUG=${FLASK_DEBUG}
      - BASE_URL=${BASE_URL}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
    depends_on:
      - redis
    volumes:
      - socket_data:/tmp   # 🔥 CRITICAL (shared with nginx)
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - socket_data:/tmp   # 🔥 SAME VOLUME
    depends_on:
      - app
    restart: always

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  alertmanager:
    image: prom/alertmanager:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -z "$${DISCORD_WEBHOOK_URL:-}" ]; then
          echo "DISCORD_WEBHOOK_URL is not set. Add it to .env before starting alertmanager." >&2
          exit 1
        fi
        esc_url=$$(printf '%s' "$${DISCORD_WEBHOOK_URL}" | sed -e 's/[\\&]/\\\\&/g')
        sed "s|__DISCORD_WEBHOOK_URL__|$${esc_url}|g" /etc/alertmanager/alertmanager.yml >/tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - alertmanager
    restart: always

volumes:
  socket_data: