version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    command: >
      sh -c "
      mkdir -p /tmp/prometheus &&
      exec uv run gunicorn -c gunicorn_conf.py run:app
      "
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_READ_URL=${DATABASE_READ_URL}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - FLASK_DEBUG=${FLASK_DEBUG}
      - BASE_URL=${BASE_URL}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-96}
      - DATABASE_POOL_MAX=${DATABASE_POOL_MAX:-4}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-gthread}
      - GUNICORN_MAX_CONCURRENCY=${GUNICORN_MAX_CONCURRENCY:-512}
      - GUNICORN_BACKLOG=${GUNICORN_BACKLOG:-2048}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    depends_on:
      - redis
    volumes:
      - socket_data:/tmp   # 🔥 CRITICAL (shared with nginx)
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro,z
      - socket_data:/tmp   # 🔥 SAME VOLUME
    depends_on:
      - app
    restart: always

volumes:
  socket_data: