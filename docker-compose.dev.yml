version: "3.9"

services:
  # 🔴 Primary DB (writes)
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 🟡 Read Replica (simulated)
  db_read:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_db
    ports:
      - "5433:5432"
    volumes:
      - db_read_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ⚡ Redis
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword}
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data:
  db_read_data: