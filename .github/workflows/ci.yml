name: CI + Deploy

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test # ⬅️ ensures tests pass first

    # Only deploy on push to main OR manual trigger
    if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/

          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy-key.pem
          chmod 600 ~/.ssh/deploy-key.pem

          cat >> ~/.ssh/config <<EOF
          Host my-vps
            Hostname ${{ secrets.DO_SSH_HOST }}
            User ${{ secrets.DO_SSH_USER }}
            IdentityFile ~/.ssh/deploy-key.pem
            StrictHostKeyChecking no
          EOF

      - name: Deploy sites
        run: |
          ssh my-vps "cd ${{ secrets.DO_DEPLOY_PATH }} && pwd && chmod u+x ./scripts/deploy.sh && ./scripts/deploy.sh"
