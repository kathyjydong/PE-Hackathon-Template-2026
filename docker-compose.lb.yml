services:
  redis:
    image: redis:alpine
    # Explicitly use the env file so REDIS_PASSWORD is known
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - hackathon_network
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf:ro
    networks:
      - hackathon_network
    restart: always

networks:
  hackathon_network:
    external: true