events {
    worker_connections 1024;
}

http {
    # Include MIME types so the browser knows CSS is actually CSS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream flask_cluster {
        least_conn;
        server app:5000;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://flask_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # This ensures that if the app is slow, Nginx waits
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Explicitly serve static files via the app cluster
        location /static/ {
            proxy_pass http://flask_cluster;
        }
    }
}