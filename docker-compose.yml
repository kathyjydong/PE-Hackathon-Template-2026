services:
# This is how we define the architecture of our system
# 3 components:
# 1. The Database (Postgres)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

# 2. The Clone Army (Your Flask App)
# This is what gets scaled up and down based on traffic and where the actual app is
  app:
    build: .
    # Unix socket for nginx upstream + TCP :5000 for host tools / k6 direct (optional)
    command:
      - sh
      - -c
      - |
        rm -rf /tmp/prometheus
        mkdir -p /tmp/prometheus
        exec uv run gunicorn -c gunicorn_conf.py run:app
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      # Inside Compose, Postgres always listens on 5432. Do not use ${DATABASE_PORT}
      # here — .env often sets 25060 (managed DB) for host tools, which breaks db:25060.
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME}
      - DATABASE_HOST=db
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-96}
      - GUNICORN_WORKER_CLASS=${GUNICORN_WORKER_CLASS:-gthread}
      - GUNICORN_MAX_CONCURRENCY=${GUNICORN_MAX_CONCURRENCY:-512}
      - DATABASE_POOL_MAX=${DATABASE_POOL_MAX:-4}
      - PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus
      - BASE_URL=${BASE_URL}
      - REDIS_RESOLVE_DEBUG=${REDIS_RESOLVE_DEBUG:-}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - socket_data:/tmp
    ports:
      - "${HOST_APP_PORT:-5001}:5000"
    restart: always

# 3. The Traffic Cop (Nginx Load Balancer)
# This is where all users get routed to to know which container to go to and handles the load for each thing
  nginx:
    image: nginx:alpine
# we can change this to localhost to test locally for development but for production thats the correct address
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
# This is what actually connects the nginx.conf file to the nginx container
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - socket_data:/tmp
# app needs to actually run for the nginx to route first
    depends_on:
      - app
    restart: always

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  alertmanager:
    image: prom/alertmanager:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -z "$${DISCORD_WEBHOOK_URL:-}" ]; then
          echo "DISCORD_WEBHOOK_URL is not set. Add it to .env before starting alertmanager." >&2
          exit 1
        fi
        esc_url=$$(printf '%s' "$${DISCORD_WEBHOOK_URL}" | sed -e 's/[\\&]/\\\\&/g')
        sed "s|__DISCORD_WEBHOOK_URL__|$${esc_url}|g" /etc/alertmanager/alertmanager.yml >/tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - alertmanager
    restart: always

# This prevents your database from deleting all its data every time you restart
volumes:
  postgres_data:
  socket_data: