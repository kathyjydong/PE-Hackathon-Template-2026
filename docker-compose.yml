services:
# This is how we define the architecture of our system
# 4 components: Database, App, Cache, Load Balancer

# 1. The Database (Postgres)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

# THE NEW SHIELD: Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

# 2. The Clone Army (Your Flask App)
# This is what gets scaled up and down based on traffic and where the actual app is
  app:
    build: .
    # Unix socket for nginx upstream + TCP :5000 for host tools / k6 direct (optional)
    command:
      - sh
      - -c
      - |
        exec uv run gunicorn -w "$${GUNICORN_WORKERS:-64}" \
          --bind unix:/tmp/app.sock \
          --bind 0.0.0.0:5000 \
          run:app
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:${DATABASE_PORT}/${DATABASE_NAME}
      - DATABASE_HOST=db
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_PORT=${DATABASE_PORT}
      - REDIS_URL=redis://redis:6379/0
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-64}
      - BASE_URL=${BASE_URL}
# Redis Connector
      - REDIS_URL=redis://redis:6379/0  

    depends_on:
      db:
        condition: service_healthy # THE FIX: App waits for the DB Healthcheck to pass
      redis:
        condition: service_started
        
# limiter so that we dont kill the droplet by mistake
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
          
    volumes:
      - socket_data:/tmp 
    restart: always

# 3. The Traffic Cop (Nginx Load Balancer)
# This is where all users get routed to to know which container to go to and handles the load for each thing
  nginx:
    image: nginx:alpine
# we can change this to localhost to test locally for development but for production thats the correct address
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
# This is what actually connects the nginx.conf file to the nginx container
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - socket_data:/tmp
# app needs to actually run for the nginx to route first
    depends_on:
      - app
    restart: always

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

# This prevents your database from deleting all its data every time you restart
volumes:
  postgres_data:
  socket_data:
