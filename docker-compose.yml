services:
# This is how we define the architecture of our system
# 3 components:
# 1. The Database (Postgres)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

# 2. The Clone Army (Your Flask App)
# This is what gets scaled up and down based on traffic and where the actual app is
  app:
    build: .
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG}
      - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@db:${DATABASE_PORT}/${DATABASE_NAME}
      - DATABASE_HOST=db
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - DATABASE_PORT=${DATABASE_PORT}
      
# This depends on clause makes it so that the app cannot run without the databasse properly being initialized first
    depends_on:
      - db
    restart: always

# 3. The Traffic Cop (Nginx Load Balancer)
# This is where all users get routed to to know which container to go to and handles the load for each thing
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"

# This is what actually connects the nginx.conf file to the nginx container
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
# app needs to actually run for the nginx to route first
    depends_on:
      - app
    restart: always

# This prevents your database from deleting all its data every time you restart
volumes:
  postgres_data: