global:
  resolve_timeout: 1m

route:
  receiver: oncall-webhook
  group_by: [alertname]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2m

receivers:
  - name: oncall-webhook
    discord_configs:
      - webhook_url: __DISCORD_WEBHOOK_URL__
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        message: >-
          {{ range .Alerts -}}
          {{ .Annotations.summary }}
          {{ if .Annotations.description }} - {{ .Annotations.description }}{{ end }}
          (severity={{ .Labels.severity }})
          {{ end }}
