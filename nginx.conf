# TSUNAMI FIX: Automatically use all 4 CPU cores on the new Droplet
worker_processes auto;

# the 1024 to be scaled up if aiming for over 500 as well as the amount of containers
# UPGRADED TO 8192 to safely handle 5,000 concurrent users
events { 
    worker_connections 8192; 
}

# L7 Load balancing handled dynamically by Docker DNS now for auto-scaling
http {
    #  We are using pure TCP multi-lane highways now.
    # We also removed the static 'upstream' block so Nginx can dynamically discover 
    # new clones spawned by the auto-scaler.

    server {
        listen 80;
        server_name short.urlshortener-mlh.xyz;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name short.urlshortener-mlh.xyz;

        # Keeping your working SSL configuration!
        ssl_certificate /etc/letsencrypt/live/short.urlshortener-mlh.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/short.urlshortener-mlh.xyz/privkey.pem;

        # THE ZERO-DOWNTIME FIX: Point Nginx to Docker's internal DNS server
        resolver 127.0.0.11 valid=2s;

        location / {
            # Use a variable so Nginx is forced to re-evaluate the DNS dynamically
            # Docker's DNS will automatically round-robin traffic to all active clones!
            set $backend http://app:5000;
            proxy_pass $backend;            
            
            # Pass along the original HTTP headers (Crucial for L7!)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header X-Cache;
        }
    }
}
