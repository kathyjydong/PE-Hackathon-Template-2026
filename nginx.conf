# worker_connections scaled up for the 500+ user Tsunami
events {
    worker_connections 4096;
}

http {
    # L7 load balancing (least_conn). 
    # Distributed: Now pointing across the private network to VPS 2.
    upstream flask_cluster {
        least_conn;
        # REPLACE <VPS_2_PRIVATE_IP> with the 10.x.x.x IP of your worker droplet
        server 10.108.0.4:5000;
        server 10.108.0.4:5001;
        server 10.108.0.4:5002;
    }

    # k6 / local: HTTP via load balancer
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_pass_header X-Cache;
            add_header X-LB nginx-vps1 always; # Identifying VPS 1 as the LB
        }
    }

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name short.urlshortener-mlh.xyz;
        return 301 https://$host$request_uri;
    }

    # Production SSL Configuration
    server {
        listen 443 ssl;
        server_name short.urlshortener-mlh.xyz;

        # Keep paths as they appear in your Docker volume mounts
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Optimization for high concurrency
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header X-Cache;
            
            # Ensure buffers are large enough for long URLs/heavy headers
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }
    }
}