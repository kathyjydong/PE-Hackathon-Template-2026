# Scaled for 500+ concurrent user tsunami
events {
    worker_connections 4096;
}

http {
    # CRITICAL: Ensures CSS and JS are served with correct headers
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # L7 load balancing (least_conn). 
    # Bridge: Points to the app clones running on VPS 2
    upstream flask_cluster {
        least_conn;
        server 10.108.0.4:5000;
        server 10.108.0.4:5001;
        server 10.108.0.4:5002;
    }

    # k6 / internal monitoring: HTTP via port 8080
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 120s;
            add_header X-LB nginx-vps1 always; 
        }
    }

    # Global HTTP to HTTPS redirect
    server {
        listen 80;
        server_name short.urlshortener-mlh.xyz;
        return 301 https://$host$request_uri;
    }

    # Production SSL Configuration
    server {
        listen 443 ssl;
        server_name short.urlshortener-mlh.xyz;

        # Let's Encrypt certificates mapped via Docker volumes
        ssl_certificate /etc/letsencrypt/live/short.urlshortener-mlh.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/short.urlshortener-mlh.xyz/privkey.pem;

        # SSL optimizations for high concurrency
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Ensure buffers handle large payloads/headers
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
            proxy_read_timeout 120s;
        }

        # Explicit routing for static assets to ensure CSS/JS load
        location /static/ {
            proxy_pass http://flask_cluster;
            proxy_set_header Host $host;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}