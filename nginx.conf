# the 1024 to be scaled up if aiming for over 500 as well as the amount of containers
events {
    worker_connections 4096;
}

# L7 load balancing (least_conn). Upstream uses shared Unix socket from gunicorn (see docker-compose).
http {
    upstream flask_cluster {
        least_conn;
        server unix:/tmp/app.sock;
    }

    # k6 / local: HTTP via load balancer
    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 120s;
            proxy_pass_header X-Cache;
            add_header X-LB nginx always;
        }
    }

    server {
        listen 80;
        server_name short.urlshortener-mlh.xyz;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name short.urlshortener-mlh.xyz;

        ssl_certificate /etc/letsencrypt/live/short.urlshortener-mlh.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/short.urlshortener-mlh.xyz/privkey.pem;

        location / {
            proxy_pass http://flask_cluster;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header X-Cache;
        }
    }
}
